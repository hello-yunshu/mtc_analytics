services:
  mtc_analytics:
    image: mtc_analytics
    build: .
    container_name: mtc_analytics
    restart: unless-stopped
    ports:
      - "127.0.0.1:8368:8080"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
